name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0"
        required: true
        default: "0.2.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf nasm cmake pkg-config libde265-dev libkvazaar-dev

      - name: Install macOS HEIC dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install cmake libde265 kvazaar

      - name: Install Windows HEIC dependencies
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = "C:\vcpkg"
          }
          $vcpkg = Join-Path $vcpkgRoot "vcpkg.exe"
          & $vcpkg install "libheif[hevc]:x64-windows-static-md"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_DYNAMIC=0" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: zipax-cross/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: zipax-cross
        run: npm ci

      - name: Verify HEIC codec
        shell: bash
        run: |
          cd zipax-cross
          cargo run -p zipax-cli -- compress src-tauri/icons/128x128.png --format heic --json
          test -s "src-tauri/icons/128x128#C.heic"
          cargo run -p zipax-cli -- compress "src-tauri/icons/128x128#C.heic" --format jpeg --json
          test -s "src-tauri/icons/128x128#C#C.jpg"
          rm -f "src-tauri/icons/128x128#C.heic" "src-tauri/icons/128x128#C#C.jpg"

      - name: Validate Windows icon resources
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $icon = [System.IO.File]::ReadAllBytes("zipax-cross/src-tauri/icons/icon.ico")
          $imageCount = [BitConverter]::ToUInt16($icon, 4)
          if ($imageCount -lt 6) {
            throw "Windows icon must contain multiple DPI layers; found $imageCount."
          }
          $sizes = for ($i = 0; $i -lt $imageCount; $i++) {
            $width = $icon[6 + ($i * 16)]
            if ($width -eq 0) { 256 } else { [int]$width }
          }
          foreach ($requiredSize in @(16, 32, 48, 256)) {
            if ($requiredSize -notin $sizes) {
              throw "Windows icon is missing the ${requiredSize}px layer. Found: $sizes"
            }
          }
          $storeLogoPath = (Resolve-Path "zipax-cross/src-tauri/icons/StoreLogo.png").Path
          $storeLogo = [System.Drawing.Bitmap]::new($storeLogoPath)
          try {
            if ($storeLogo.GetPixel(0, 0).A -ne 0) {
              throw "Windows icon corners must be transparent."
            }
          } finally {
            $storeLogo.Dispose()
          }

      - name: Build release from tag
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: zipax-cross
          tagName: ${{ github.ref_name }}
          releaseName: "zipax ${{ github.ref_name }}"
          releaseBody: "See RELEASE_NOTES.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build release manually
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: zipax-cross
          tagName: v${{ inputs.version }}
          releaseName: "zipax v${{ inputs.version }}"
          releaseBody: "See RELEASE_NOTES.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Validate Windows executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $exe = Get-Item "zipax-cross/target/release/zipax-app.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $optionalHeader = $peOffset + 24
          $subsystem = [BitConverter]::ToUInt16($bytes, $optionalHeader + 68)
          if ($subsystem -ne 2) {
            throw "Expected Windows GUI subsystem (2), found $subsystem."
          }
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon($exe.FullName)
          if ($null -eq $icon) {
            throw "The Windows executable has no associated icon."
          }
          $bitmap = $icon.ToBitmap()
          try {
            if ($bitmap.Width -lt 16 -or $bitmap.Height -lt 16) {
              throw "The embedded Windows icon is too small."
            }
            if ($bitmap.GetPixel(0, 0).A -ne 0) {
              throw "The embedded Windows icon corners must be transparent."
            }
          } finally {
            $bitmap.Dispose()
            $icon.Dispose()
          }

      - name: Report bundle sizes
        shell: bash
        run: |
          echo "### Bundle sizes (${{ matrix.platform }})" >> "$GITHUB_STEP_SUMMARY"
          find zipax-cross/target/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -print | sort | while read -r file; do
              size=$(du -h "$file" | awk '{print $1}')
              echo "- \`$(basename "$file")\`: $size" >> "$GITHUB_STEP_SUMMARY"
            done
