name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0"
        required: true
        default: "0.2.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf nasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: zipax-cross/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: zipax-cross
        run: npm ci

      - name: Build release from tag
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: zipax-cross
          tagName: ${{ github.ref_name }}
          releaseName: "zipax ${{ github.ref_name }}"
          releaseBody: "See RELEASE_NOTES.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build release manually
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: zipax-cross
          tagName: v${{ inputs.version }}
          releaseName: "zipax v${{ inputs.version }}"
          releaseBody: "See RELEASE_NOTES.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
